{% extends "base.html" %}
{% block title %}创建队伍 · {{ project.title }}{% endblock %}
{% block content %}
<p class="back"><a href="/projects/{{ project.id }}">← 返回项目</a></p>

<main class="card">
  <h1>创建队伍</h1>
  <p class="muted">项目：{{ project.title }}</p>
  {% if error %}
  <p role="alert">{{ error }}</p>
  {% endif %}
  <form method="post" action="/projects/{{ project.id }}/teams">
    <label>队伍名称<input type="text" name="name" maxlength="100" required></label>
    <button class="btn btn-primary" type="submit">创建并认领</button>
  </form>
</main>
{% endblock %}
