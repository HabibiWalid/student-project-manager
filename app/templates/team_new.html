<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>创建队伍 · {{ project.title }}</title>
</head>
<body>
  <p><a href="/projects/{{ project.id }}">← 返回项目</a></p>

  <main>
    <h1>创建队伍</h1>
    <p>项目：{{ project.title }}</p>
    {% if error %}
    <p role="alert">{{ error }}</p>
    {% endif %}
    <form method="post" action="/projects/{{ project.id }}/teams">
      <label>队伍名称<input type="text" name="name" maxlength="100" required></label>
      <button type="submit">创建并认领</button>
    </form>
  </main>
</body>
</html>
