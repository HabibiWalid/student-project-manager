{% extends "base.html" %}
{% block title %}提交成果 · {{ team.name }}{% endblock %}
{% block content %}
<p class="back"><a href="/teams/{{ team.id }}">← 返回队伍</a></p>

<main class="card">
  <h1>提交成果</h1>
  <p class="muted">队伍：{{ team.name }}</p>
  {% if error %}
  <p role="alert">{{ error }}</p>
  {% endif %}
  <form method="post" action="/teams/{{ team.id }}/submissions" enctype="multipart/form-data">
    <label>说明<textarea name="note" maxlength="5000"></textarea></label>
    <label>文件（可多选，支持 pdf/zip/docx/png/jpg，单个不超过 20MB）
      <input type="file" name="files" multiple required>
    </label>
    <button class="btn btn-primary" type="submit">提交</button>
  </form>
</main>
{% endblock %}
